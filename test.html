<!DOCTYPE html>
<html>
    <body>
   <h2>Gemini API Test</h2>
   <button onclick="testKey()">คลิกเพื่อทดสอบ Key</button>
   <p id="result">รอทดสอบ...</p>

   <script>
     async function testKey() {
       const KEY = "AIzaSyCUeQYZMC3uiq2h6hZyJ2QVjtI-NLXMp4A";
       const url =
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
       const res = document.getElementById('result');
       res.innerText = "กำลังเชื่อมต่อ...";

      try {
         const response = await fetch(url, {
           method: 'POST',
           headers: {'Content-Type': 'application/json'},
           body: JSON.stringify({ contents: [{ parts: [{ text: "Hello" }] }] })
         });
         const data = await response.json();
         res.innerText = JSON.stringify(data, null, 2);
       } catch (e) {
         res.innerText = "Error: " + e.message;
       }
     }
   </script>
 </body>
 </html>
