# Netlify configuration file

[build]
  # This is the directory to publish from.
  # If you are just dragging and dropping a folder, make sure this matches.
  # If you are just dropping a single index.html file, this setting is not needed.
  # publish = "."

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://oauth2.googleapis.com https://accounts.google.com https://www.googleapis.com; img-src 'self' data: https:; media-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://accounts.google.com https://apis.google.com; frame-src https://accounts.google.com;"
